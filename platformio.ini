[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
; Native USB: Serial from first boot; fewer “connected but silent” cases after reset.
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSER_SETUP_LOADED=1
  -include include/User_Setup.h
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_CONF_PATH=\"${PROJECT_DIR}/include/lv_conf.h\"
; Avoid DTR/RTS toggling resetting the board when opening the monitor (macOS flake).
monitor_rts = 0
monitor_dtr = 0
lib_deps =
  bogde/HX711
  bodmer/TFT_eSPI
  lvgl/lvgl
